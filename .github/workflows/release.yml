name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-mac:
    name: Build macOS (Universal binary)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: installer/go.sum

      - name: Build macOS universal binary
        run: |
          cd installer
          VER="${{ github.ref_name }}"
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w -X main.Version=${VER}" -o /tmp/cc-darwin-arm64 ./webui/
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w -X main.Version=${VER}" -o /tmp/cc-darwin-amd64 ./webui/
          lipo -create -output CCQuickInstaller-mac /tmp/cc-darwin-arm64 /tmp/cc-darwin-amd64
          chmod +x CCQuickInstaller-mac
          # lipo 合并后会破坏 Go 链接器写入的 ad-hoc 签名，Apple 芯片会以 SIGKILL("killed")拒绝运行。
          # 这里对通用二进制重新做一次 ad-hoc 签名，恢复有效签名。
          codesign --force --sign - CCQuickInstaller-mac
          codesign --verify --verbose CCQuickInstaller-mac

      - uses: actions/upload-artifact@v4
        with:
          name: mac-binary
          path: installer/CCQuickInstaller-mac

  build-windows:
    name: Build Windows GUI (x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: installer/go.sum

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build Windows GUI
        working-directory: installer/gui
        run: wails build -platform windows/amd64 -clean -webview2 embed -ldflags "-X main.Version=${{ github.ref_name }}"

      - name: Copy to release name
        shell: pwsh
        run: Copy-Item installer\gui\build\bin\CCQuickInstaller.exe CCQuickInstaller-${{ github.ref_name }}-win-x64.exe

      - uses: actions/upload-artifact@v4
        with:
          name: win-exe
          path: CCQuickInstaller-${{ github.ref_name }}-win-x64.exe

  release:
    name: Publish Release
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: mac-binary

      - uses: actions/download-artifact@v4
        with:
          name: win-exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            CCQuickInstaller-mac
            CCQuickInstaller-${{ github.ref_name }}-win-x64.exe
          body: |
            ## Claude Code Quick Installer ${{ github.ref_name }}

            一键安装 Claude Code — 用户态、零依赖、国内直连。

            ---

            ### macOS — 推荐：一行命令（最省事）

            打开终端，粘贴以下命令回车即可，全程自动：

            ```bash
            curl -fsSL https://raw.githubusercontent.com/Alan-Youngzhe/CC_quick_installer/main/install.sh | bash
            ```

            ### macOS — 备选：手动下载

            下载本页的 `CCQuickInstaller-mac`，然后在终端执行：

            ```bash
            cd ~/Downloads
            chmod +x CCQuickInstaller-mac
            ./CCQuickInstaller-mac
            ```

            > ⚠️ 注意：必须先 `cd ~/Downloads` 进入下载目录，再运行命令。

            ---

            ### Windows x64

            下载本页的 `CCQuickInstaller-${{ github.ref_name }}-win-x64.exe`，双击运行，图形界面自动弹出。

            ---

            ### 安装完成后

            1. 在「import_config」面板粘贴你的 `settings.json`（配置模型与 API Key）
            2. 打开**新终端**，输入 `claude` 开始使用
